<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Case Searcher</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="card" id="root">
    <div class="row header">
      <div class="title">Search Mode</div>
      <div id="saved" class="saved" aria-hidden="true">Saved</div>
    </div>

    <div class="controls">
      <div class="mode">
        <button id="modeCustomer" class="mode-btn active" aria-pressed="true">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4.418 0-8 2.238-8 5v1h16v-1c0-2.762-3.582-5-8-5z"/></svg>
          <span class="label">Customer</span>
        </button>

        <label class="toggle">
          <input id="modeToggle" type="checkbox" />
          <span class="track">
            <span class="knob"></span>
          </span>
        </label>

        <button id="modeOrder" class="mode-btn" aria-pressed="false">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v2H3zm0 5h12v2H3zm0 5h18v2H3z"/></svg>
          <span class="label">Order</span>
        </button>
      </div>

      <div class="current">Currently: <strong id="currentMode">Customer ID</strong></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
